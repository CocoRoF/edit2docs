# English message catalog for edit2docs.
# Keys are dot-separated namespaces (errors.*, stages.*, tools.*).
# Values may contain {placeholders} resolved by str.format-style substitution.
# See ppt-master-analysis/06-bilingual-conventions.md for the two-track i18n policy.

errors:
  invalid_source_format: "Unsupported source format: {format}. Supported: {allowed}."
  source_too_large: "Source file exceeds the limit ({size_mb}MB > {limit_mb}MB)."
  missing_source: "At least one source must be provided (file upload or URL)."
  llm_api_key_missing: "Anthropic API key is required. Pass it via the X-Anthropic-API-Key header or register it on your tenant."
  llm_api_key_invalid: "The provided LLM API key was rejected by the upstream provider."
  llm_rate_limited: "Upstream LLM rate limit reached. Retry after {retry_after_seconds}s."
  asset_not_found: "Asset {asset_id} was not found or has expired."
  project_not_found: "Project {project_id} was not found."
  job_not_found: "Job {job_id} was not found."
  unauthorized: "Missing or invalid API key."
  forbidden: "You do not have permission to access this resource."
  internal_error: "An internal error occurred. The incident has been logged ({trace_id})."
  invalid_lang: "Unsupported lang code: {lang}. Supported: ko-KR, en-US, zh-CN, zh-TW, ja-JP."
  invalid_template: "Unknown template: {template}. Use GET /v1/templates to list available templates."

stages:
  queued: "Job queued"
  converting: "Converting sources to markdown"
  analyzing_template: "Analyzing template PPTX"
  analyzing_deck: "Rendering deck for editing"
  planning_edits: "Planning edits"
  editing_slides: "Editing slides"
  applying_edits: "Applying edits to PPTX"
  strategizing: "Designing presentation strategy"
  acquiring_images: "Acquiring images"
  generating_image: "Generating image: {prompt_short}"
  searching_image: "Searching image: {query}"
  executing_pages: "Generating pages"
  executing_page: "Generating page {page}/{total}"
  checking_quality: "Checking SVG quality"
  exporting: "Exporting PPTX"
  narrating: "Generating audio narration"
  done: "Done"
  failed: "Job failed"
  cancelled: "Job cancelled"

tools:
  generate_deck:
    summary: "Generate an editable PPTX from source documents."
    description: |
      Generate an editable PPTX from source documents and user intent.
      Sources must be uploaded first via `edit2docs.upload_source` and referenced by asset_id.
      Returns a presigned download URL for the resulting PPTX, plus per-page preview URLs.
      Supports Korean (ko-KR), English (en-US), Chinese (zh-CN, zh-TW), Japanese (ja-JP).
  upload_source:
    summary: "Upload a source document (PDF, DOCX, PPTX, XLSX) or register a URL."
    description: |
      Returns an asset_id for use in other tools. Files may be uploaded inline as base64
      for small payloads, or via a presigned PUT URL for larger ones. Korean filenames
      are preserved end-to-end (stored as original_filename, downloaded with RFC 5987 encoding).
  list_templates:
    summary: "List available layout templates."
    description: "Returns the catalog of layouts with names, summaries, and thumbnail URLs."
  list_voices:
    summary: "List TTS voices, optionally filtered by locale."
    description: "Returns voice ids and labels for narration. Filter by ?lang=ko-KR for Korean voices."

units:
  page: "page"
  pages: "pages"
  mb: "MB"
