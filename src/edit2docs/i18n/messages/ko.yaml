# Korean message catalog for edit2docs.
# 키는 점(.)으로 구분된 네임스페이스 (errors.*, stages.*, tools.*).
# 값에는 {플레이스홀더} 가 들어갈 수 있으며 str.format 으로 치환됩니다.
# 컨벤션은 ppt-master-analysis/06-bilingual-conventions.md 참조.

errors:
  invalid_source_format: "지원하지 않는 소스 형식입니다: {format}. 지원 형식: {allowed}."
  source_too_large: "소스 파일이 제한을 초과합니다 ({size_mb}MB > {limit_mb}MB)."
  missing_source: "최소 한 개 이상의 소스가 필요합니다 (파일 업로드 또는 URL)."
  llm_api_key_missing: "Anthropic API 키가 필요합니다. X-Anthropic-API-Key 헤더로 전달하거나 테넌트에 등록해주세요."
  llm_api_key_invalid: "제공된 LLM API 키가 업스트림 제공자에서 거부되었습니다."
  llm_rate_limited: "업스트림 LLM 호출 제한에 도달했습니다. {retry_after_seconds}초 후 다시 시도해주세요."
  asset_not_found: "자산 {asset_id} 를 찾을 수 없거나 만료되었습니다."
  project_not_found: "프로젝트 {project_id} 를 찾을 수 없습니다."
  job_not_found: "작업 {job_id} 를 찾을 수 없습니다."
  unauthorized: "API 키가 없거나 잘못되었습니다."
  forbidden: "이 리소스에 접근할 권한이 없습니다."
  internal_error: "내부 오류가 발생했습니다. 로그에 기록되었습니다 ({trace_id})."
  invalid_lang: "지원하지 않는 lang 코드입니다: {lang}. 지원: ko-KR, en-US, zh-CN, zh-TW, ja-JP."
  invalid_template: "알 수 없는 템플릿입니다: {template}. GET /v1/templates 로 사용 가능 목록을 확인하세요."

stages:
  queued: "작업 대기 중"
  converting: "소스를 마크다운으로 변환 중"
  analyzing_template: "템플릿 PPTX 분석 중"
  analyzing_deck: "덱 렌더링 중"
  planning_edits: "편집 계획 수립 중"
  editing_slides: "슬라이드 편집 중"
  applying_edits: "PPTX 반영 중"
  strategizing: "발표 전략 설계 중"
  acquiring_images: "이미지 확보 중"
  generating_image: "이미지 생성 중: {prompt_short}"
  searching_image: "이미지 검색 중: {query}"
  executing_pages: "페이지 생성 중"
  executing_page: "{page}/{total} 페이지 생성 중"
  checking_quality: "SVG 품질 검사 중"
  exporting: "PPTX 내보내는 중"
  narrating: "오디오 내레이션 생성 중"
  done: "완료"
  failed: "작업 실패"
  cancelled: "작업 취소됨"

tools:
  generate_deck:
    summary: "소스 문서로부터 편집 가능한 PPTX를 생성합니다."
    description: |
      소스 문서와 사용자 의도로부터 편집 가능한 PPTX를 생성합니다.
      소스 파일은 `edit2docs.upload_source` 로 먼저 업로드한 후 asset_id로 참조해야 합니다.
      결과 PPTX의 단기 다운로드 URL과 페이지별 미리보기 URL을 반환합니다.
      한국어(ko-KR), 영어(en-US), 중국어(zh-CN, zh-TW), 일본어(ja-JP) 를 지원합니다.
  upload_source:
    summary: "소스 문서(PDF, DOCX, PPTX, XLSX)를 업로드하거나 URL을 등록합니다."
    description: |
      다른 도구에서 사용할 asset_id를 반환합니다. 작은 파일은 base64 인라인으로,
      큰 파일은 presigned PUT URL을 통해 업로드합니다. 한글 파일명은 끝까지 보존되며
      (original_filename 으로 저장, RFC 5987 인코딩으로 다운로드) 다운로드 시 원본 한글 파일명으로 저장됩니다.
  list_templates:
    summary: "사용 가능한 레이아웃 템플릿 목록을 반환합니다."
    description: "이름, 요약 설명, 썸네일 URL을 포함한 레이아웃 카탈로그를 반환합니다."
  list_voices:
    summary: "TTS 음성 목록 (locale 필터 가능)."
    description: "내레이션용 음성 id 와 라벨을 반환합니다. ?lang=ko-KR 로 한국어 음성만 필터링 가능."

units:
  page: "페이지"
  pages: "페이지"
  mb: "MB"
