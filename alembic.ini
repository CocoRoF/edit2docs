# Alembic configuration for edit2docs.
#
# Run migrations:
#   .venv/bin/alembic upgrade head
#
# Autogenerate a new migration after editing models.py:
#   .venv/bin/alembic revision --autogenerate -m "describe change"
#
# DATABASE_URL is loaded from the EDIT2DOCS_DATABASE_URL env var via env.py.

[alembic]
script_location = src/edit2docs/db/migrations
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# Use the async URL form; env.py runs it through create_async_engine.
sqlalchemy.url = postgresql+asyncpg://edit2docs:edit2docs@localhost:5432/edit2docs

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
